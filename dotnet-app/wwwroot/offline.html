<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Offline – Finance Tracker</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: #f0f4f9;
            color: #1e293b;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        .card {
            background: #fff;
            border-radius: 1rem;
            box-shadow: 0 8px 32px rgba(30,58,95,.15);
            padding: 3rem 2.5rem;
            max-width: 480px;
            width: 100%;
            text-align: center;
        }

        .icon {
            font-size: 4rem;
            margin-bottom: 1.5rem;
        }

        h1 {
            font-size: 1.75rem;
            font-weight: 700;
            color: #1e3a5f;
            margin-bottom: .75rem;
        }

        p {
            color: #64748b;
            line-height: 1.65;
            margin-bottom: 1.5rem;
        }

        .btn {
            display: inline-block;
            background: #2563eb;
            color: #fff;
            padding: .65rem 1.5rem;
            border-radius: .5rem;
            font-weight: 600;
            text-decoration: none;
            border: none;
            cursor: pointer;
            font-size: 1rem;
            transition: background .2s;
        }

        .btn:hover { background: #1d4ed8; }

        footer {
            margin-top: 2rem;
            font-size: .8rem;
            color: #94a3b8;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="icon">📡</div>
        <h1>You're Offline</h1>
        <p>
            Finance Tracker couldn't connect to the server. Please check your internet connection and try again.
        </p>
        <button class="btn" onclick="window.location.reload()">
            Try Again
        </button>
    </div>
    <footer>Finance Tracker · Offline Mode</footer>
</body>
</html>
