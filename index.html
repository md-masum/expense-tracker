<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <meta name="theme-color" content="#0d6efd" />
  <meta name="description" content="Offline finance tracker for construction and agriculture projects" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Finance Tracker" />
  <title>Finance Tracker</title>

  <!-- PWA -->
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icon.svg" />

  <!-- Bootstrap 5 -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />

  <!-- App styles -->
  <link rel="stylesheet" href="css/app.css" />
</head>
<body>

  <!-- Login Screen (shown when not authenticated) -->
  <div id="login-screen" class="d-none">
    <div class="login-wrapper">
      <div class="login-card card shadow-lg border-0">
        <div class="card-body p-4 p-sm-5">
          <div class="text-center mb-4">
            <img src="icon.svg" width="72" height="72" alt="Finance Tracker" class="login-logo mb-3" />
            <h4 class="fw-bold mb-1">Finance Tracker</h4>
            <p class="text-muted small mb-0">Sign in to access your data</p>
          </div>
          <div id="loginError" class="alert alert-danger d-none py-2 small"></div>
          <div class="mb-3">
            <label class="form-label fw-semibold" for="loginEmail">Email</label>
            <input type="email" class="form-control" id="loginEmail"
                   placeholder="you@example.com" autocomplete="email" />
          </div>
          <div class="mb-4">
            <label class="form-label fw-semibold" for="loginPassword">Password</label>
            <input type="password" class="form-control" id="loginPassword"
                   placeholder="Your password" autocomplete="current-password" />
          </div>
          <button class="btn btn-primary w-100 fw-semibold" id="loginBtn">
            <span class="spinner-border spinner-border-sm me-2 d-none" id="loginSpinner"></span>
            Sign In
          </button>
        </div>
      </div>
    </div>
  </div>

  <!-- Navbar -->
  <nav class="navbar navbar-expand-md navbar-dark bg-primary fixed-top shadow-sm">
    <div class="container-fluid">
      <a class="navbar-brand fw-bold" href="#/dashboard">
        <i class="bi bi-wallet2 me-2"></i>Finance Tracker
      </a>
      <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"
              aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item">
            <a class="nav-link px-3" href="#/dashboard" data-navlink="dashboard">
              <i class="bi bi-speedometer2 me-1"></i>Dashboard
            </a>
          </li>
          <li class="nav-item">
            <a class="nav-link px-3" href="#/projects" data-navlink="projects">
              <i class="bi bi-folder me-1"></i>Projects
            </a>
          </li>
          <li class="nav-item">
            <a class="nav-link px-3" href="#/categories" data-navlink="categories">
              <i class="bi bi-tags me-1"></i>Categories
            </a>
          </li>
          <li class="nav-item">
            <a class="nav-link px-3" href="#/backup" data-navlink="backup">
              <i class="bi bi-cloud-arrow-up me-1"></i>Backup
            </a>
          </li>
        </ul>
        <div class="d-flex align-items-center ms-md-3 mt-2 mt-md-0 pb-2 pb-md-0"
             id="userInfo" style="display:none!important">
          <span class="text-white-50 small me-2" id="userEmail" style="max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap"></span>
          <button class="btn btn-outline-light btn-sm" onclick="App.logout()" title="Sign out">
            <i class="bi bi-box-arrow-right"></i>
          </button>
        </div>
      </div>
    </div>
  </nav>

  <!-- Main content area -->
  <main id="app-content">
    <div class="d-flex justify-content-center align-items-center" style="height:60vh">
      <div class="spinner-border text-primary" role="status">
        <span class="visually-hidden">Loading…</span>
      </div>
    </div>
  </main>

  <footer class="app-footer" aria-label="Site footer">
    <span>Design and developed by Masum</span>
    <span class="app-footer-sep">|</span>
    <a href="mailto:md.wr.masum@gmail.com">md.wr.masum@gmail.com</a>
    <span class="app-footer-sep">|</span>
    <span id="appVersion">v1.0.0</span>
  </footer>

  <!-- Modal (shared) -->
  <div class="modal fade" id="appModal" tabindex="-1" aria-modal="true" role="dialog">
    <div class="modal-dialog modal-dialog-centered modal-dialog-scrollable">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title" id="modalTitle"></h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>
        <div class="modal-body" id="modalBody"></div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
          <button type="button" class="btn btn-primary" id="modalSaveBtn">Save</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Toast notifications -->
  <div class="position-fixed bottom-0 end-0 p-3" style="z-index:2100">
    <div id="appToast" class="toast align-items-center text-white border-0" role="alert" aria-live="assertive">
      <div class="d-flex">
        <div class="toast-body" id="toastBody"></div>
        <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>
      </div>
    </div>
  </div>

  <!-- PWA Install banner (shows on supporting browsers) -->
  <div id="install-banner" class="install-banner d-none">
    <span><i class="bi bi-phone me-2"></i>Install this app on your device for offline use</span>
    <button class="btn btn-sm btn-light ms-3" id="installBtn">Install</button>
    <button class="btn btn-sm btn-outline-light ms-2" id="dismissInstall">&times;</button>
  </div>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

  <!-- Firebase (must load before app scripts) -->
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

  <!-- App scripts (order matters) -->
  <script src="js/version.js"></script>
  <script src="js/firebase-config.js"></script>
  <script src="js/db.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
